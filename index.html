<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OT Cyber Range by Xploit Academy — Industrial Cybersecurity Awareness Training</title>
<meta name="description" content="OT Cyber Range by Xploit Academy — interactive, scenario-based OT/ICS cybersecurity awareness training. Fully offline-capable.">
<style>
/* ============================================================
   OT CYBER RANGE — HMI-inspired design system
   Palette: ink #0A0B0D | panel #141619 | line #26292E
   signal red #EF0F0D | white #F5F6F7 | amber #FFB020 | green #2ECC71
   ============================================================ */
:root{
  --ink:#0A0B0D;
  --panel:#141619;
  --panel-2:#1B1E22;
  --line:#26292E;
  --line-strong:#3A3E45;
  --text:#F5F6F7;
  --text-dim:#9AA0A8;
  --red:#EF0F0D;
  --red-dim:#8C1210;
  --amber:#FFB020;
  --green:#2ECC71;
  --blue:#3B9DD9;
  --radius:3px;
  --mono:ui-monospace,"Cascadia Mono","SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --shadow:0 8px 28px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --ink:#EEF0F2;
  --panel:#FFFFFF;
  --panel-2:#F5F6F8;
  --line:#D6D9DE;
  --line-strong:#B7BBC2;
  --text:#14161A;
  --text-dim:#5A6069;
  --shadow:0 8px 24px rgba(20,22,26,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
body{
  background:var(--ink);
  color:var(--text);
  font-family:var(--sans);
  font-size:16px;
  line-height:1.55;
  min-height:100vh;
}
body::before{ /* faint grid, control-room drawing sheet */
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:48px 48px;opacity:.14;
}
#app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 20px 80px}
a{color:var(--text)}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ---------- header / telemetry strip ---------- */
header.hud{
  position:sticky;top:0;z-index:50;
  background:color-mix(in srgb,var(--ink) 88%,transparent);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  margin:0 -20px;padding:0 20px;
}
.hud-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 0;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;color:var(--text)}
.brand-logo-link{display:flex;align-items:center;border-radius:50%;transition:box-shadow .15s ease,transform .12s ease}
.brand-logo-link:hover{box-shadow:0 0 0 1px var(--red),0 0 14px rgba(239,15,13,.45);transform:translateY(-1px)}
.brand-name-btn{display:flex;align-items:center;background:none;border:0;color:var(--text);padding:0;cursor:pointer}
.brand-mark{width:38px;height:38px;flex:none}
img.brand-mark{border-radius:50%;display:block}
.brand-name{font-weight:800;letter-spacing:.14em;font-size:15px;text-transform:uppercase}
.brand-name small{display:block;font-family:var(--mono);font-size:9.5px;font-weight:400;letter-spacing:.22em;color:var(--red)}
.telemetry{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.tele{
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  border:1px solid var(--line);border-radius:var(--radius);
  padding:5px 9px;display:flex;align-items:center;gap:7px;color:var(--text-dim);
  background:var(--panel);
}
.tele b{color:var(--text);font-weight:600}
.led{width:8px;height:8px;border-radius:50%;flex:none;background:var(--green);box-shadow:0 0 6px var(--green)}
.led.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.led.amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.icon-btn{
  border:1px solid var(--line);background:var(--panel);color:var(--text);
  border-radius:var(--radius);padding:5px 10px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
}
.icon-btn:hover{border-color:var(--line-strong)}

/* ---------- generic panel ---------- */
.panel{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);position:relative;
}
.panel-head{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);
}
.panel-body{padding:20px}
.tag{
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--line);border-radius:var(--radius);padding:2px 7px;color:var(--text-dim);
}
.tag.red{color:var(--red);border-color:var(--red-dim)}
.tag.green{color:var(--green);border-color:var(--green)}
.tag.amber{color:var(--amber);border-color:var(--amber)}

/* ---------- hero ---------- */
.hero{margin:34px 0 26px;display:grid;grid-template-columns:1.35fr .9fr;gap:22px;align-items:stretch}
.hero h1{
  font-size:clamp(30px,4.6vw,46px);font-weight:800;line-height:1.06;letter-spacing:-.015em;
  text-transform:uppercase;
}
.hero h1 .accent{color:var(--red)}
.hero p.lede{color:var(--text-dim);margin:14px 0 20px;max-width:52ch}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--red)}
.hero-visual{min-height:220px;display:flex;align-items:center;justify-content:center;padding:14px}
.hero-visual svg{width:100%;height:auto;max-height:280px}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:9px;border-radius:var(--radius);
  padding:11px 20px;font-weight:700;font-size:14px;letter-spacing:.04em;border:1px solid transparent;
  transition:transform .12s ease,box-shadow .12s ease,background .12s ease;
  text-transform:uppercase;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{box-shadow:0 0 0 1px var(--red),0 6px 20px rgba(239,15,13,.35)}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--line-strong)}
.btn-ghost:hover{border-color:var(--text-dim)}
.btn-sm{padding:7px 13px;font-size:12px}
.btn[disabled]{opacity:.45;cursor:not-allowed}

/* ---------- stats row ---------- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:6px 0 26px}
.stat{padding:14px 16px}
.stat .k{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim)}
.stat .v{font-size:26px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.stat .v small{font-size:12px;color:var(--text-dim);font-weight:500}
.xpbar{height:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:99px;margin-top:9px;overflow:hidden}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--red-dim),var(--red));transition:width .5s ease}

/* ---------- module grid ---------- */
.toolbar{display:flex;gap:10px;align-items:center;margin:0 0 14px;flex-wrap:wrap}
.toolbar input[type=search]{
  flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  color:var(--text);padding:9px 12px;font-family:var(--mono);font-size:13px;
}
.toolbar input[type=search]::placeholder{color:var(--text-dim)}
.chip{
  border:1px solid var(--line);background:var(--panel);color:var(--text-dim);
  border-radius:99px;padding:6px 13px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;
}
.chip[aria-pressed=true]{color:#fff;background:var(--red);border-color:var(--red)}
.units{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.unit{
  text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  color:var(--text);padding:0;overflow:hidden;display:flex;flex-direction:column;
  transition:border-color .15s ease,transform .15s ease;
}
.unit:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.unit-head{
  display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;
}
.unit-body{padding:15px 16px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
.unit h3{font-size:17px;font-weight:700;line-height:1.25}
.unit p{font-size:13.5px;color:var(--text-dim)}
.unit-art{height:110px;display:flex;align-items:center;justify-content:center;background:var(--panel-2);border-bottom:1px solid var(--line)}
.unit-art svg{height:82px;width:auto}
.unit-foot{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:8px}
.unit-foot .tag{margin-left:auto}
.progress-mini{flex:1;height:5px;background:var(--panel-2);border:1px solid var(--line);border-radius:99px;overflow:hidden}
.progress-mini i{display:block;height:100%;background:var(--red)}
.unit.done .progress-mini i{background:var(--green)}

/* ---------- player ---------- */
.player{margin-top:26px}
.player-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.player-head h2{font-size:20px;text-transform:uppercase;letter-spacing:.02em}
.crumbs{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.1em}
.scene-art{background:var(--panel-2);border-bottom:1px solid var(--line);display:flex;justify-content:center;padding:18px}
.scene-art svg{max-height:190px;width:auto;max-width:100%}
.node-title{font-size:22px;font-weight:800;margin-bottom:10px;text-transform:uppercase;letter-spacing:.01em}
.node-text{color:var(--text);max-width:66ch;white-space:pre-line}
.node-text.dim{color:var(--text-dim)}
.dialog{
  display:flex;gap:14px;align-items:flex-start;background:var(--panel-2);
  border:1px solid var(--line);border-left:3px solid var(--red);border-radius:var(--radius);
  padding:14px 16px;margin-top:6px;
}
.avatar{
  width:44px;height:44px;flex:none;border-radius:50%;border:1px solid var(--line-strong);
  display:flex;align-items:center;justify-content:center;background:var(--ink);
  font-family:var(--mono);font-weight:700;font-size:14px;color:var(--red);
}
.dialog .who{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
.options{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.opt{
  text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);
  color:var(--text);padding:13px 16px;font-size:14.5px;display:flex;gap:12px;align-items:flex-start;
  transition:border-color .12s ease,background .12s ease;
}
.opt:hover{border-color:var(--red)}
.opt .key{
  font-family:var(--mono);font-size:11px;color:var(--red);border:1px solid var(--red-dim);
  border-radius:var(--radius);padding:1px 7px;flex:none;margin-top:2px;
}
.feedback{border-radius:var(--radius);border:1px solid;padding:16px 18px;margin-top:6px}
.feedback.good{border-color:var(--green);background:color-mix(in srgb,var(--green) 8%,var(--panel))}
.feedback.risky{border-color:var(--amber);background:color-mix(in srgb,var(--amber) 8%,var(--panel))}
.feedback.bad{border-color:var(--red);background:color-mix(in srgb,var(--red) 8%,var(--panel))}
.feedback .fb-head{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:9px}
.feedback.good .fb-head{color:var(--green)}
.feedback.risky .fb-head{color:var(--amber)}
.feedback.bad .fb-head{color:var(--red)}
.fb-xp{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
.bullets{margin:10px 0 0 0;list-style:none;display:flex;flex-direction:column;gap:9px}
.bullets li{display:flex;gap:10px;align-items:flex-start;font-size:14.5px}
.bullets li::before{content:"";width:7px;height:7px;border-radius:1px;background:var(--red);flex:none;margin-top:7px}
.player-nav{display:flex;gap:10px;margin-top:22px;align-items:center}
.stepper{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-left:auto;letter-spacing:.1em}

/* ---------- quiz ---------- */
.quiz-q{font-size:17px;font-weight:700;margin-bottom:14px}
.quiz-opt{composes:opt}
.quiz-opt.correct{border-color:var(--green);background:color-mix(in srgb,var(--green) 10%,var(--panel-2))}
.quiz-opt.wrong{border-color:var(--red);background:color-mix(in srgb,var(--red) 10%,var(--panel-2))}
.explain{margin-top:14px;font-size:14px;color:var(--text-dim);border-left:2px solid var(--line-strong);padding-left:12px}

/* ---------- summary / badges ---------- */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.badge{
  border:1px solid var(--line);border-radius:var(--radius);padding:14px;text-align:center;
  background:var(--panel-2);display:flex;flex-direction:column;align-items:center;gap:8px;
}
.badge.locked{opacity:.38;filter:grayscale(1)}
.badge .b-ico{width:46px;height:46px}
.badge .b-name{font-weight:700;font-size:13px}
.badge .b-desc{font-size:11.5px;color:var(--text-dim)}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px}
.toast{
  background:var(--panel);border:1px solid var(--red);border-radius:var(--radius);
  padding:11px 16px;box-shadow:var(--shadow);font-family:var(--mono);font-size:12px;
  display:flex;align-items:center;gap:9px;animation:toastIn .25s ease;
}
@keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

/* ---------- certificate ---------- */
.cert{
  background:var(--panel);border:1px solid var(--line-strong);padding:46px 40px;text-align:center;
  position:relative;overflow:hidden;
}
.cert::before{content:"";position:absolute;inset:10px;border:1px solid var(--red-dim);pointer-events:none}
.cert h2{font-size:30px;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 4px}
.cert .cert-name{font-size:26px;font-weight:800;color:var(--red);margin:16px 0 4px}
.cert .mono{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase}
.cert-seal{width:96px;height:96px;margin:0 auto 10px}
img.cert-seal{border-radius:50%}
input.field{
  background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);color:var(--text);
  padding:10px 13px;font-size:14px;width:100%;max-width:340px;
}
label.flabel{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px}

/* ---------- exam gate ---------- */
.gate{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:34px 20px}
.gate svg{width:64px;height:64px}

.section-title{
  display:flex;align-items:center;gap:12px;margin:30px 0 14px;
  font-family:var(--mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--text-dim);
}
.section-title::after{content:"";flex:1;height:1px;background:var(--line)}

footer.site{margin-top:56px;border-top:1px solid var(--line);padding-top:18px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;color:var(--text-dim);font-family:var(--mono);font-size:11px;letter-spacing:.08em}
footer.site .led{width:6px;height:6px}

/* ---------- featured Xploit Academy courses ---------- */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.feature-card{
  position:relative;display:flex;flex-direction:column;gap:12px;
  background:
    radial-gradient(120% 140% at 100% 0%,color-mix(in srgb,var(--red) 12%,transparent) 0%,transparent 42%),
    var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 20px 18px;color:var(--text);overflow:hidden;
  box-shadow:var(--shadow);
  transition:border-color .16s ease,transform .16s ease,box-shadow .16s ease;
}
.feature-card::before{ /* top hairline accent */
  content:"";position:absolute;left:0;top:0;height:2px;width:100%;
  background:linear-gradient(90deg,var(--red),transparent 70%);opacity:.9;
}
.feature-card:hover{
  border-color:var(--red);transform:translateY(-3px);
  box-shadow:0 0 0 1px var(--red-dim),0 14px 34px rgba(239,15,13,.16),var(--shadow);
}
.fc-top{display:flex;align-items:center;gap:10px}
.fc-mark{width:40px;height:40px;flex:none;color:var(--red)}
.fc-mark svg{width:40px;height:40px;display:block}
.fc-kicker{
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--red);border:1px solid var(--red-dim);border-radius:99px;padding:3px 10px;
}
.fc-title{font-size:19px;font-weight:800;line-height:1.2;letter-spacing:-.01em;text-transform:uppercase}
.fc-desc{font-size:13.5px;color:var(--text-dim);line-height:1.5}
.fc-meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.fc-meta span{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--text-dim);
  border:1px solid var(--line);border-radius:99px;padding:3px 9px;
}
.fc-cta{
  margin-top:auto;display:inline-flex;align-items:center;gap:8px;
  font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);
}
.fc-cta .arrow{color:var(--red);transition:transform .16s ease}
.feature-card:hover .fc-cta .arrow{transform:translateX(4px)}
.feature-note{
  font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.04em;
  margin:12px 0 2px;
}

/* ---------- responsive ---------- */
@media (max-width:860px){
  .hero{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .feature-grid{grid-template-columns:1fr}
}
@media (max-width:520px){
  .stats{grid-template-columns:1fr 1fr}
  .brand-name{font-size:13px}
}

/* ---------- print (certificate) ---------- */
@media print{
  body::before,header.hud,.no-print,.toast-wrap,footer.site{display:none !important}
  body{background:#fff;color:#000}
  #app{max-width:100%;padding:0}
  .cert{border-color:#999;box-shadow:none;background:#fff;color:#000}
  .cert .mono{color:#444}
}
</style>
</head>
<body>
<div class="toast-wrap" id="toasts" aria-live="polite"></div>
<header class="hud">
  <div class="hud-inner">
    <div class="brand">
      <a class="brand-logo-link" href="https://www.xploitacademy.com" target="_blank" rel="noopener noreferrer" aria-label="Visit Xploit Academy — xploitacademy.com">
        <img class="brand-mark" id="brandLogo" alt="Xploit Academy logo" width="38" height="38">
      </a>
      <button class="brand-name-btn" id="brandBtn" aria-label="Go to dashboard">
        <span class="brand-name">OT Cyber Range<small>by Xploit Academy // ICS-SCADA</small></span>
      </button>
    </div>
    <div class="telemetry" id="telemetry"></div>
  </div>
</header>
<main id="app" tabindex="-1"></main>
<script>
/* ============================================================
   DATA LAYER — JSON-driven scenario engine content.
   To add a module: append an object to MODULES following the

  nodes:{
    start:{type:"scene",title:"District cooling plant — 14:10",art:"remote",
      text:"You are the control room engineer. A chiller train is showing intermittent alarms. The phone rings: a man introduces himself as 'Tom from the chiller vendor's support team', says he saw the fault remotely, and asks you to enable the remote access connection and read him the TeamViewer ID from the engineering PC so he can fix it 'before it trips the whole train'.",next:"dec1"},
    dec1:{type:"decision",prompt:"How do you respond to the caller?",options:[
      {label:"Enable remote access and read the ID — the fault is urgent and he clearly knows the system.",quality:"bad",xp:10,
       feedback:"Urgency plus insider-sounding detail is the classic social engineering pattern. Attackers research plants on LinkedIn, vendor sites, and leaked documents. You would be granting an unverified stranger a live session on control equipment.",next:"c1"},
      {label:"Ask for his ticket number, hang up, and call the vendor back on the official number from the approved contact list.",quality:"good",xp:50,
       feedback:"Correct. Verification through a known, independent channel defeats caller-ID spoofing and impersonation. Legitimate vendors expect this.",next:"c1"},
      {label:"Tell him to email you the request and then decide.",quality:"risky",xp:20,
       feedback:"Email alone proves little — sender addresses are easily spoofed. Callback verification via the official number plus an authorized change/ticket reference is the standard.",next:"c1"}
    ]},
    c1:{type:"scene",title:"Verification",art:"remote",
      text:"You call the vendor's registered support line. They have no engineer named Tom and no open ticket for your site. The vendor confirms: several customers reported identical calls this week — an active social engineering campaign targeting remote access to industrial sites.",next:"d1"},
    d1:{type:"dialog",speaker:"Nadia",role:"Plant Manager",
      text:"Well handled. But the chiller alarm is real and we do need vendor support today. What is the correct way to run a genuine remote session?",next:"dec2"},
    dec2:{type:"decision",prompt:"Choose the correct procedure for legitimate vendor remote access.",options:[
      {label:"Approved request + MFA through the secure remote access gateway, session time-limited, supervised and logged, disabled afterwards.",quality:"good",xp:50,
       feedback:"Correct. Remote access to OT is: requested and approved, authenticated with MFA, brokered through a hardened gateway (never direct internet exposure), supervised in real time, recorded, and disconnected when done.",next:"info1"},
      {label:"Leave the permanent VPN tunnel open so the vendor can connect whenever needed.",quality:"bad",xp:10,
       feedback:"Standing, always-on vendor tunnels are one of the most exploited paths into OT. Access must be enabled per session and disabled after.",next:"info1"},
      {label:"Let the vendor connect first, then create the ticket afterwards if it works.",quality:"risky",xp:20,
       feedback:"Approval and logging come before the session, not after — otherwise there is no accountability and no rollback point.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — secure remote vendor access",bullets:[
      "Verify every support caller via an official callback number and ticket reference.",
      "All remote OT access goes through an approved gateway with MFA — never direct RDP/TeamViewer exposed to the internet.",
      "Sessions are approved, time-boxed, supervised, recorded, and disabled after use.",
      "Vendors get unique named accounts with least privilege — no shared logins.",
      "Report impersonation attempts immediately; others are being targeted too."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"You stopped an impersonation attempt and ran a compliant remote session instead. Remote access is consistently among the top initial attack vectors into industrial control systems.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"A caller claiming to be vendor support asks you to enable remote access urgently. You should:",

      {q:"Which remote access setup is acceptable for OT?",
       options:["Permanent open VPN for the vendor","MFA-protected gateway, per-session approval, supervised and logged","Direct RDP from the internet with a strong password","Vendor's own unmanaged remote tool"],answer:1,
       explain:"Brokered, approved, monitored, time-limited sessions are the standard for OT remote access."},
      {q:"The strongest social engineering lever the fake caller used was:",
       options:["Technical jargon","Urgency and apparent insider knowledge","A friendly tone","Calling at shift change"],answer:1,
       explain:"Manufactured urgency pressures people to skip verification — the moment to slow down, not speed up."}

  art:"hmi",
  nodes:{
    start:{type:"scene",title:"Pumping station — planning office",art:"hmi",
      text:"A security advisory is published: the HMI software running your pumping station has a critical remotely exploitable vulnerability. IT wants it patched within 48 hours, as they do for office PCs. Production says the station cannot stop this month. You are the OT engineer in the middle.",next:"dec1"},
    dec1:{type:"decision",prompt:"What is your first move?",options:[
      {label:"Push the patch tonight from the update server — 48-hour SLA is policy.",quality:"bad",xp:10,
       feedback:"Untested patches on live OT can stop production or destabilize control — availability and safety come first in OT. Patching ICS follows change management with testing, vendor approval, and a maintenance window.",next:"c1"},
      {label:"Ignore the advisory — the plant network is separate from the internet anyway.",quality:"bad",xp:10,
       feedback:"'Segmented' is not 'invulnerable' — remote access, USB media, and IT/OT interconnects all reach that HMI. Doing nothing leaves a known critical hole open indefinitely.",next:"c1"},
      {label:"Assess exposure, apply compensating controls now, and schedule a vendor-approved patch in the next maintenance window through change management.",quality:"good",xp:50,
       feedback:"Correct. Risk-based OT patching: verify whether the vulnerable service is reachable, mitigate immediately (firewall rules, disable the service, tighten access), test the vendor-qualified patch, then deploy in a planned window with rollback and backups ready.",next:"c1"}
    ]},
    c1:{type:"dialog",speaker:"Imran",role:"Contract Manager",
      text:"Head office is asking why OT can't just meet the same 48-hour patch SLA as IT. Give me the one-line answer for the steering meeting.",next:"dec2"},
    dec2:{type:"decision",prompt:"Pick the best explanation.",options:[
      {label:"OT teams are slower and need more staff.",quality:"bad",xp:10,
       feedback:"It is not a resourcing excuse — it is a fundamentally different risk model.",next:"info1"},
      {label:"In OT, an untested patch can itself cause the outage or safety event we're protecting against — so we mitigate immediately and patch through tested, scheduled changes.",quality:"good",xp:50,
       feedback:"Exactly. IT prioritizes confidentiality; OT prioritizes safety and availability. Same goal, different sequence: mitigate now, patch safely.",next:"info1"},
      {label:"Vendors forbid us from patching at all.",quality:"risky",xp:20,
       feedback:"Vendors qualify patches and timing — they don't forbid patching. Overstating this becomes an excuse for permanent inaction.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — OT patch & change management",bullets:[
      "Track advisories for every asset — you can only patch what your asset inventory knows exists.",
      "Assess real exposure: is the vulnerable service reachable in your architecture?",
      "Apply compensating controls immediately (segmentation, service hardening, access restriction).",
      "Deploy vendor-qualified patches in planned maintenance windows with tested rollback and fresh backups.",
      "Every change to OT goes through formal change management — including 'small' ones."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"You closed the exposure immediately without gambling plant availability, and patched safely on schedule. This mitigate-then-patch discipline is the core of OT vulnerability management.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"A critical vulnerability affects a production HMI. The best immediate action is:",
       options:["Push the patch instantly","Apply compensating controls and schedule a tested patch via change management","Disconnect the HMI permanently","Wait for the annual shutdown"],answer:1,
       explain:"Mitigate now, patch through a tested, planned change — protecting both security and availability."},
      {q:"Why can't IT patch SLAs be copied directly to OT?",
       options:["OT software has no patches","An untested OT patch can itself cause outages or safety events","OT systems patch themselves","Regulations prohibit OT patching"],answer:1,
       explain:"OT prioritizes safety and availability, so patches are vendor-qualified and deployed in controlled windows."},
      {q:"Effective vulnerability management in OT starts with:",
       options:["Buying more firewalls","An accurate asset inventory","Disabling all alarms","Faster internet"],answer:1,
       explain:"Without knowing your assets and versions, advisories cannot even be mapped to real exposure."}

  }

  id:"ransom", unit:"UNIT-06", cat:"Incident Response", minutes:10,

  desc:"Screens lock across the site. The next thirty minutes decide whether production — and safety — survive the day.",

  nodes:{
    start:{type:"scene",title:"Site-wide alert — 11:47",art:"ransom",
      text:"Office PCs across the facility suddenly display a ransom note. File shares are encrypting. In the control room, SCADA screens still work — for now. Phones start ringing. You are the senior operator on shift, and the site incident response plan names you as the first OT decision-maker.",next:"dec1"},
    dec1:{type:"decision",prompt:"Your first action in the control room?",options:[
      {label:"Follow the incident response plan: alert the crisis team, and prepare to isolate OT from IT at the defined boundary points while confirming safe manual/local control.",quality:"good",xp:50,
       feedback:"Correct. Contain at the IT/OT boundary before the malware crosses it, keep the process safe and observable, and escalate through the pre-defined chain. This is exactly what the IR plan and drills exist for.",next:"c1"},
      {label:"Shut down all PLCs immediately to protect them.",quality:"risky",xp:20,
       feedback:"An uncontrolled emergency shutdown can itself create safety and equipment damage. Isolate networks and move to known-safe operating states per procedure — don't improvise a blackout.",next:"c1"},
      {label:"Keep operating normally — SCADA still works, so it's an IT problem.",quality:"bad",xp:10,
       feedback:"Ransomware crews deliberately pivot from IT into OT, and losing historians, engineering servers, or domain services can blind operations minutes later. Waiting forfeits your containment window.",next:"c1"}
    ]},
    c1:{type:"scene",title:"Containment",art:"ransom",
      text:"The crisis team convenes. IT/OT boundary firewalls are switched to deny-all per the playbook. Operators confirm the process is stable on local control. The ransomware encrypted office systems and one historian in the DMZ — but never reached the control network.\n\nNow leadership asks: how fast can we restore, and can we trust our backups?",next:"dec2"},
    dec2:{type:"decision",prompt:"Which backup strategy makes recovery credible?",options:[
      {label:"Backups exist on the same network file share as the encrypted data.",quality:"bad",xp:10,
       feedback:"Ransomware encrypts reachable backups first. Online-only backups on the same network are effectively no backups.",next:"dec3"},
      {label:"Offline/immutable backups of critical OT data — PLC programs, HMI projects, configurations — tested by actual restore drills.",quality:"good",xp:50,
       feedback:"Correct. Offline or immutable copies, stored separately, with documented restore procedures that have been genuinely tested — recovery time is decided long before the incident.",next:"dec3"},
      {label:"The vendor probably keeps copies of our PLC programs.",quality:"risky",xp:20,
       feedback:"'Probably' is not a recovery plan. Your latest tested configurations are your responsibility.",next:"dec3"}
    ]},
    dec3:{type:"decision",prompt:"During the incident, a journalist calls the control room asking for details. You should:",options:[
      {label:"Give a short factual statement to be helpful.",quality:"bad",xp:10,
       feedback:"Communications during incidents flow only through the designated crisis communications role — uncoordinated statements create legal, regulatory and security damage.",next:"info1"},
      {label:"Refer the caller to the official communications contact and report the call to the crisis team.",quality:"good",xp:50,
       feedback:"Correct. One voice speaks for the company during a crisis; everyone else routes and reports.",next:"info1"},
      {label:"Deny anything is happening.",quality:"risky",xp:20,
       feedback:"Don't engage at all — no confirmations, no denials. Route to communications and report the contact.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — OT incident response & resilience",bullets:[
      "Know your role in the incident response plan before you need it — and drill it.",
      "Contain early at the IT/OT boundary; keep the process in a safe, observable state.",
      "Maintain offline/immutable backups of PLC programs, HMI projects and configs — and test restores.",
      "Preserve evidence; do not wipe or reboot systems the responders need.",
      "All external communication goes through the designated crisis role only."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"Your early containment kept ransomware out of the control network, and tested backups turned a potential week-long outage into a controlled recovery. Response quality is decided by preparation, not improvisation.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"Ransomware hits the office network while SCADA still works. Your priority is to:",
       options:["Continue normally — it's IT's issue","Alert the crisis team and contain at the IT/OT boundary per the IR plan","Power off all PLCs instantly","Pay the ransom quickly"],answer:1,
       explain:"Early boundary containment protects OT while keeping the process in a safe state."},
      {q:"Backups that survive ransomware are:",
       options:["On the main file share","Offline or immutable, stored separately, with tested restores","Kept only by the vendor","Unnecessary if you have antivirus"],answer:1,
       explain:"Reachable backups get encrypted; only offline/immutable, restore-tested copies count."},
      {q:"During an incident, media inquiries are handled by:",
       options:["Whoever answers the phone","The designated crisis communications role only","The most senior engineer on shift","Social media replies"],answer:1,
       explain:"A single coordinated voice prevents legal, regulatory, and security fallout."}
    ]}
  }
},
{
  id:"plc", unit:"UNIT-07", cat:"Control Integrity", minutes:9,
  title:"PLC Logic Manipulation",
  desc:"A pump behaves strangely, the HMI shows normal — and the controller logic no longer matches the golden master.",
  art:"plc",
  nodes:{
    start:{type:"scene",title:"Desalination plant — 05:55",art:"plc",
      text:"Night shift reports pump P-204 cycling erratically, yet every HMI value reads normal. As the OT engineer, you upload the running PLC program and compare it against the approved 'golden master' backup.\n\nThe comparison flags modified rungs in the pump control logic — and there is no approved change request on record.",next:"d1"},
    d1:{type:"dialog",speaker:"Hassan",role:"Shift Supervisor",
      text:"Production wants P-204 stable before the morning peak. Can't you just download last month's project file from your laptop and move on? We can figure out the paperwork later.",next:"dec1"},
    dec1:{type:"decision",prompt:"Unapproved logic changes are running in a live controller. What do you do?",options:[
      {label:"Re-download an old project copy from your laptop and get production stable — investigate later.",quality:"risky",xp:20,
       feedback:"Overwriting the controller destroys the evidence of what was changed, when, and by whom — and your laptop copy may not be the approved version. Stabilize the process using operational procedures, but preserve the modified program for investigation.",next:"c1"},
      {label:"Treat it as a control integrity incident: keep the process safe, preserve the running program, and report to OT security before any overwrite.",quality:"good",xp:50,
       feedback:"Correct. Unauthorized logic modification is one of the most serious events in OT — the exact technique used by attacks like Stuxnet and Triton. Evidence preservation and a controlled restore from the verified golden master are the professional response.",next:"c1"},
      {label:"The process still runs and HMI looks fine — log it as a nuisance alarm and monitor.",quality:"bad",xp:10,
       feedback:"Manipulated logic can be designed to look normal on the HMI while damaging equipment or masking unsafe states. 'It still runs' is exactly what the attacker wants you to conclude.",next:"c1"}
    ]},
    c1:{type:"scene",title:"The investigation",art:"plc",
      text:"OT security traces the modification to an engineering workstation session at 02:13 — logged in with the shared 'engineer' account that half the department knows. The modified rungs suppressed a high-vibration interlock on P-204.\n\nWhoever made the change had full programming rights, and the shared account makes attribution impossible.",next:"dec2"},
    dec2:{type:"decision",prompt:"Which combination actually prevents unauthorized logic changes?",options:[
      {label:"Individual named accounts, PLC change detection with version control, controller keyswitch in RUN, and logic changes only via change management.",quality:"good",xp:50,
       feedback:"Correct. Attribution (named accounts), detection (automated program comparison and versioning), prevention (physical keyswitch / access control on programming ports), and process (approved changes only) — defense in depth for control integrity.",next:"info1"},
      {label:"Ban all PLC programming permanently.",quality:"bad",xp:10,
       feedback:"Plants need legitimate logic changes to operate. Prohibition just drives changes underground — control comes from managed, attributable change, not from pretending change won't happen.",next:"info1"},
      {label:"Set a password on the PLC itself and keep the shared account.",quality:"risky",xp:20,
       feedback:"A controller password helps, but a shared engineering account still means no attribution, no accountability, and one leaked credential compromising everything. Named accounts and change detection are essential.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — protecting control logic integrity",bullets:[
      "Maintain verified golden master backups of every PLC program — and compare regularly.",
      "Use automated change detection / version control on controller logic and configurations.",
      "Named individual accounts only on engineering workstations — never shared logins.",
      "Keep controller keyswitches in RUN and restrict physical access to programming ports.",
      "Treat any unapproved logic change as a security incident: preserve evidence, restore from verified backups."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"You detected and correctly handled a live logic manipulation that suppressed a safety interlock. Attacks on control integrity aim at physical consequences — detection depends on golden masters, change control, and engineers who refuse to overwrite evidence.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"Running PLC logic differs from the golden master with no approved change. Your first response is to:",
       options:["Overwrite it with an old project file immediately","Keep the process safe, preserve the program, and report a control integrity incident","Ignore it if the HMI reads normal","Reboot the PLC"],answer:1,
       explain:"Unauthorized logic modification is a serious incident — preserve evidence, then restore from the verified master under control."},
      {q:"Why are shared engineering accounts dangerous in OT?",
       options:["They cost more licenses","They make changes unattributable and one leaked credential exposes everything","They slow down login","They expire too quickly"],answer:1,
       explain:"Attribution and accountability require named individual accounts."},
      {q:"Manipulated control logic is especially dangerous because it can:",
       options:["Only affect reports","Appear normal on the HMI while suppressing protections or damaging equipment","Be fixed by any reboot","Never persist after download"],answer:1,
       explain:"Sophisticated ICS attacks hide physical manipulation behind normal-looking operator displays."}
    ]}
  }
},
{
  id:"pwd", unit:"UNIT-08", cat:"Access Control", minutes:8,
  title:"Default Passwords Expose Critical Systems",
  desc:"Brand-new RTUs, factory credentials, and a contractor who plans to 'change them later'.",
  art:"passwd",
  nodes:{
    start:{type:"scene",title:"Substation upgrade — commissioning day",art:"passwd",
      text:"You are supervising the commissioning of new RTUs and managed switches. Spot-checking a device, you log in with 'admin / admin' — it works. So does the default password on the next three devices, and on the protection relay's web interface.\n\nThe integration contractor shrugs: 'Standard practice. We change them all at final handover in six weeks. Easier for the whole team to work this way.'",next:"dec1"},
    dec1:{type:"decision",prompt:"Six weeks of factory-default credentials on grid-connected devices. Your call?",options:[
      {label:"Accept it — commissioning is temporary and the team needs easy access.",quality:"bad",xp:10,
       feedback:"Default credentials are published in vendor manuals and scanned for constantly. 'Temporary' devices on a live network are compromised in hours, not weeks — and commissioning periods are when attackers find the door wide open.",next:"c1"},
      {label:"Require defaults to be changed per the hardening checklist before any device connects to the network — no exceptions.",quality:"good",xp:50,
       feedback:"Correct. Hardening before connection is the rule: unique credentials, disabled unused services, and documented configuration are commissioning gate criteria, not handover paperwork.",next:"c1"},
      {label:"Change defaults only on devices reachable from outside the substation.",quality:"risky",xp:20,
       feedback:"Reachability changes — a contractor laptop, a temporary bridge, a misconfigured firewall — and suddenly 'internal only' devices are exposed. Every device gets hardened, regardless of assumed exposure.",next:"c1"}
    ]},
    c1:{type:"scene",title:"The wider check",art:"passwd",
      text:"Prompted by your finding, OT security runs a credential audit across the site. Results: an HMI web panel, two network switches, and a UPS management card — all still on factory defaults, some installed years ago. One switch's default login was reachable from the office network through an approved but overly broad firewall rule.\n\nAny attacker with the vendor manual had administrator access waiting for them.",next:"d1"},
    d1:{type:"dialog",speaker:"Sara",role:"OT Security Lead",
      text:"We're fixing the audit findings now. For the team's new standard: how should credentials be managed across hundreds of OT devices going forward?",next:"dec2"},
    dec2:{type:"decision",prompt:"Choose the sustainable credential practice for OT.",options:[
      {label:"Unique credentials per device, stored in an approved password vault, MFA where supported, and periodic audits for defaults.",quality:"good",xp:50,
       feedback:"Correct. Uniqueness contains any single compromise, the vault makes uniqueness workable at scale, MFA protects the critical interfaces, and audits catch what slips through.",next:"info1"},
      {label:"One strong password shared across all devices so the team never gets locked out.",quality:"risky",xp:20,
       feedback:"One credential to compromise them all — and it never gets changed because everything depends on it. Shared secrets don't scale down risk; they concentrate it.",next:"info1"},
      {label:"Unique passwords, kept on a laminated card in the control room for quick access.",quality:"bad",xp:10,
       feedback:"A visible password list defeats the purpose — visitors, contractors, photos, and CCTV all see it. Approved vaults exist precisely to make unique credentials practical and protected.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — credential hygiene in OT",bullets:[
      "Change all factory-default credentials before a device ever joins the network.",
      "Unique credentials per device and per person — no shared logins, no password reuse.",
      "Use an approved password vault; never spreadsheets, sticky notes, or wall charts.",
      "Enable MFA on remote access, engineering tools, and management interfaces that support it.",
      "Audit regularly for defaults — new devices, spares, and vendor replacements reintroduce them."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"You closed a six-week default-credential window and triggered an audit that found years-old exposures. Default and shared passwords remain among the most common — and most preventable — findings in OT security assessments.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"Factory-default credentials on new OT devices must be changed:",
       options:["At final handover","Before the device connects to any network","Only if internet-facing","During the next annual audit"],answer:1,
       explain:"Hardening is a pre-connection gate — defaults are public knowledge and actively scanned for."},
      {q:"The safest way to manage hundreds of unique OT device credentials is:",
       options:["A shared team password","A laminated card in the control room","An approved password vault with access control","Memorizing them"],answer:2,
       explain:"Vaults make unique, protected credentials practical at scale."},
      {q:"Why must internal-only devices also be hardened?",
       options:["Regulations mention them first","Reachability changes — bridges, laptops, and firewall rules can expose them at any time","They are more expensive","Vendors require it for warranty"],answer:1,
       explain:"Assumed isolation fails quietly; hardening every device removes the standing risk."}
    ]}
  }
},
{
  id:"tech", unit:"UNIT-09", cat:"Physical Security", minutes:8,
  title:"The Fake Maintenance Technician",
  desc:"Hi-vis vest, toolbox, confident smile, urgent job — and no appointment in the system.",
  art:"tech",
  nodes:{
    start:{type:"scene",title:"Plant gate — 13:20",art:"tech",
      text:"A man in a hi-vis vest and branded workwear arrives at reception carrying a toolbox. He says he's from the UPS service company for an urgent battery replacement in the control building: 'Head office booked it this morning — if I don't do it today, you risk losing backup power.'\n\nThere is no visitor appointment in the system. As you pass through the turnstile, he moves to follow you in.",next:"dec1"},
    dec1:{type:"decision",prompt:"He's one step behind you at the turnstile. What do you do?",options:[
      {label:"Hold the gate — the job sounds genuinely urgent and he clearly knows the site.",quality:"bad",xp:10,
       feedback:"Tailgating is the number-one physical intrusion technique, and urgency plus authentic-looking workwear is the standard costume. Vest, toolbox, and confidence are available to anyone.",next:"c1"},
      {label:"Politely stop him, direct him back to reception, and ask security to verify his identity and work order with the facility team before any access.",quality:"good",xp:50,
       feedback:"Correct. No verified work order, no access — regardless of urgency or appearance. Challenging politely is professionalism, not rudeness, and genuine technicians expect it.",next:"c1"},
      {label:"Let him wait inside the lobby unescorted while you go find the facilities manager.",quality:"risky",xp:20,
       feedback:"Better than granting access, but an unattended visitor inside the perimeter can photograph layouts, plant devices, or slip deeper inside. Unverified visitors stay at reception, attended.",next:"c1"}
    ]},
    c1:{type:"scene",title:"Verification",art:"tech",
      text:"Security checks: the UPS vendor has no job booked for your site today, and no technician matching his name. When asked for ID, the visitor becomes agitated, then leaves quickly. CCTV review shows he had already photographed the electrical room signage and the badge reader by the side entrance.\n\nThis was a physical social engineering attempt — reconnaissance, or worse.",next:"d1"},
    d1:{type:"dialog",speaker:"Nadia",role:"Plant Manager",
      text:"Good catch — and a wake-up call. I want a simple visitor rule everyone on site can follow, from operators to contractors. What should it be?",next:"dec2"},
    dec2:{type:"decision",prompt:"Choose the visitor and contractor access standard for OT areas.",options:[
      {label:"Verified ID plus confirmed work order before entry; logged and badged; escorted at all times inside control and electrical rooms.",quality:"good",xp:50,
       feedback:"Correct. Verify, log, badge, escort — and anyone in an OT area without a badge or escort gets challenged politely, every time, by everyone.",next:"info1"},
      {label:"Escort visitors only inside the server room; the rest of the plant is low risk.",quality:"risky",xp:20,
       feedback:"Control panels, network cabinets, engineering desks, and field devices are all attack surfaces — physical access to OT areas is access to the control system.",next:"info1"},
      {label:"Rely on CCTV — cameras cover everything anyway.",quality:"bad",xp:10,
       feedback:"Cameras record intrusions; they don't prevent them. By the time footage is reviewed, a rogue device may already be plugged into your network.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — physical security for OT sites",bullets:[
      "No verified identity and work order, no access — urgency never overrides verification.",
      "Never allow tailgating: one badge, one person, every time, including for colleagues.",
      "Visitors and contractors are logged, badged, and escorted in control and electrical areas.",
      "Politely challenge anyone unbadged or unescorted — a challenge culture is a control.",
      "Report suspicious visitors and photography immediately; reconnaissance precedes attacks."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"You stopped a physical social engineering attempt at the turnstile and hardened the site's visitor discipline. Physical access to OT equipment bypasses nearly every network control you have — the door is part of the perimeter.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"An unannounced technician with an urgent job but no appointment should be:",
       options:["Escorted in — urgency is safety-relevant","Held at reception until identity and work order are verified","Allowed in if his company branding looks genuine","Sent directly to the control room supervisor"],answer:1,
       explain:"Verification before access, always — genuine technicians expect and accept it."},
      {q:"Tailgating through a controlled door is:",
       options:["Courtesy between colleagues","A leading physical intrusion technique that must be refused politely","Acceptable during shift change","Only an issue at data centers"],answer:1,
       explain:"One badge, one person — attackers rely on politeness to walk straight in."},
      {q:"Escort requirements apply in OT areas because physical access allows an intruder to:",
       options:["Use the coffee machine","Plug rogue devices into control networks and tamper with panels","See the weather","Read public notice boards"],answer:1,
       explain:"Hands on equipment defeats network defenses — physical security is OT security."}
    ]}
  }
},
{
  id:"vendorx", unit:"UNIT-10", cat:"Remote Access", minutes:9,
  title:"Compromised Vendor Remote Access",
  desc:"The 03:00 session comes from your trusted vendor's real account — but their engineer is on leave.",
  art:"vendorx",
  nodes:{
    start:{type:"scene",title:"Security operations alert — 03:04",art:"vendorx",
      text:"You are on call. The SOC phones: the remote access account of your turbine vendor authenticated at 03:00 and is actively browsing engineering file shares in the OT DMZ — outside any approved maintenance window.\n\nYou call the vendor's duty manager. Their assigned engineer is on annual leave, and nobody at the vendor is connected to your site right now. The credentials are real. The person using them is not.",next:"dec1"},
    dec1:{type:"decision",prompt:"A live session on legitimate vendor credentials, confirmed unauthorized. First action?",options:[
      {label:"Disable the vendor account and terminate the session immediately per the incident playbook, then escalate to the crisis team.",quality:"good",xp:50,
       feedback:"Correct. Containment first: cut the access, preserve session logs, escalate. Every additional minute is lateral movement time toward the control network.",next:"c1"},
      {label:"Keep watching quietly to learn what the attacker is after before acting.",quality:"risky",xp:20,
       feedback:"Extended observation is a decision for trained incident responders with containment ready — not a default. In OT, the downside of 'watching' can be physical. Contain per playbook; responders can analyze preserved logs.",next:"c1"},
      {label:"Email the vendor asking them to check with their engineer and wait for the reply.",quality:"bad",xp:10,
       feedback:"You already confirmed by phone that the session is unauthorized. Waiting on email leaves an active intruder inside your DMZ for hours.",next:"c1"}
    ]},
    c1:{type:"scene",title:"The debrief",art:"vendorx",
      text:"Investigation findings: the vendor engineer's laptop was compromised by phishing weeks ago; his credentials and VPN certificate were stolen. Your site's exposure was limited because vendor access terminated in the DMZ jump host — but two findings hurt: the account was enabled 24/7 under a legacy 'convenience' exception, and it had no MFA because 'the vendor's tool didn't support it'.\n\nThe attacker had eleven minutes inside. With MFA and per-session enablement, they would have had none.",next:"dec2"},
    dec2:{type:"decision",prompt:"Which control set actually protects against compromised vendor credentials?",options:[
      {label:"MFA mandatory with no exceptions, accounts disabled by default and enabled per approved session, least-privilege access, and alerting on vendor activity outside approved windows.",quality:"good",xp:50,
       feedback:"Correct. Assume vendor credentials will eventually be stolen — MFA blocks their reuse, per-session enablement removes the standing door, least privilege limits the blast radius, and monitoring catches what remains.",next:"info1"},
      {label:"Trust the vendor's own security program — their credentials, their responsibility.",quality:"bad",xp:10,
       feedback:"Their laptop, your plant. Supply chain compromises are precisely why your controls must not depend on the vendor's hygiene. Contracts set their obligations; your architecture limits their access.",next:"info1"},
      {label:"Require the vendor to use longer, more complex passwords.",quality:"risky",xp:20,
       feedback:"Stolen credentials are stolen at any length — the phished laptop gave up the password and certificate together. Only MFA, session control, and monitoring address credential theft.",next:"info1"}
    ]},
    info1:{type:"info",title:"Best practices — resilient third-party access",bullets:[
      "Assume vendor credentials will be stolen: MFA on all third-party access, no legacy exceptions.",
      "Vendor accounts disabled by default — enabled per approved, time-boxed session only.",
      "Least privilege per vendor and per task; access terminates in a monitored DMZ jump host.",
      "Alert on vendor activity outside approved windows, and review vendor access rights regularly.",
      "Set security requirements in contracts: incident notification, MFA support, patching, named engineers."],next:"sum"},
    sum:{type:"summary",title:"Scenario complete",
      text:"You contained a supply-chain credential compromise in minutes and closed the standing-access exceptions that made it possible. Trusted vendor channels are prime attacker targets precisely because they are trusted — resilience means your controls hold even when a partner's fail.",next:"quiz"},
    quiz:{type:"quiz",questions:[
      {q:"A vendor account shows unauthorized live activity, confirmed by the vendor. First action:",
       options:["Email the vendor and wait","Terminate the session and disable the account per playbook, then escalate","Observe the attacker to learn intent","Restart the firewall"],answer:1,
       explain:"Containment first — cut access, preserve logs, escalate through the incident process."},
      {q:"The control that most directly defeats stolen vendor passwords is:",
       options:["Longer passwords","Multi-factor authentication with no exceptions","Annual awareness posters","Faster VPN hardware"],answer:1,
       explain:"MFA makes a stolen password insufficient — the single highest-value control for remote access."},
      {q:"Vendor remote accounts should be:",
       options:["Enabled 24/7 for support convenience","Disabled by default and enabled per approved, time-boxed session","Shared between the vendor's engineers","Exempt from monitoring as trusted parties"],answer:1,
       explain:"Standing access is a standing door; per-session enablement removes it."}
    ]}
  }
}

<script>
/* ============================================================
   ENGINE — state, storage, gamification, views, scenario player

/* ---------- storage (localStorage with in-memory fallback) ---------- */
const memStore = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return memStore[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};
const SKEY = "otcr_state_v1";

function defaultState(){
  return { xp:0, streak:1, lastVisit:null, name:"", theme:"dark",
    badges:[], modules:{}, examPassed:false, examScore:null, examDate:null };
}
let S = (()=>{ try{ return Object.assign(defaultState(), JSON.parse(store.get(SKEY)||"{}")); }
              catch(e){ return defaultState(); } })();
function save(){ store.set(SKEY, JSON.stringify(S)); }

/* ---------- helpers ---------- */
const $ = sel => document.querySelector(sel);
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function levelOf(xp){ return Math.floor(xp/300)+1; }
function levelPct(xp){ return Math.round((xp%300)/3); }
function doneCount(s){ return MODULES.filter(m=>s.modules[m.id]?.done).length; }
function mState(id){ if(!S.modules[id]) S.modules[id]={node:"start",steps:0,done:false,score:0,total:0,perfect:false}; return S.modules[id]; }
function modProgress(m){
  const st=S.modules[m.id]; if(!st) return 0; if(st.done) return 100;
  const total=Object.keys(m.nodes).length + m.nodes.quiz.questions.length;
  return Math.min(95, Math.round(100*st.steps/total));
}

/* ---------- streak ---------- */
(function trackStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(S.lastVisit !== today){
    const y = new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak = (S.lastVisit === y) ? (S.streak||0)+1 : 1;
    S.lastVisit = today; save();
  }
})();

/* ---------- toasts & badges ---------- */
function toast(msg, cls){
  const t=document.createElement("div"); t.className="toast";
  t.innerHTML = `<span class="led ${cls||'red'}"></span>${msg}`;
  $("#toasts").appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(),450); }, 3200);
}
function awardXP(n, label){ if(!n) return; S.xp+=n; save(); toast(`+${n} XP — ${esc(label||"progress")}`,"amber"); renderTelemetry(); }
function checkBadges(){
  BADGES.forEach(b=>{
    if(!S.badges.includes(b.id) && b.test(S)){
      S.badges.push(b.id); save();
      toast(`BADGE UNLOCKED — ${b.name}`,"green");
    }
  });
}

/* ---------- theme ---------- */
function applyTheme(){ document.documentElement.dataset.theme = S.theme; }
function toggleTheme(){ S.theme = S.theme==="dark" ? "light" : "dark"; save(); applyTheme(); renderTelemetry(); }

}

/* ---------- module player ---------- */
function renderModule(id){
  const mod = MODULES.find(m=>m.id===id);
  const st = mState(id);
  if(st.done && st.node==="quiz") st.node="start"; // review mode restarts
  const node = mod.nodes[st.node] || mod.nodes.start;
  const totalNodes = Object.keys(mod.nodes).length;

  let inner="";
  if(node.type==="scene"){
    inner = `${node.art?`<div class="scene-art">${ART[node.art]}</div>`:""}
      <div class="panel-body">
        <div class="node-title">${esc(node.title)}</div>
        <p class="node-text">${esc(node.text)}</p>
        <div class="player-nav"><button class="btn btn-primary" data-next="${node.next}">Continue</button>
        <span class="stepper">STEP ${st.steps+1}</span></div>
      </div>`;
  }
  else if(node.type==="dialog"){
    inner = `<div class="panel-body">
      <div class="dialog"><div class="avatar" aria-hidden="true">${esc(node.speaker[0])}</div>
        <div><div class="who">${esc(node.speaker)} — ${esc(node.role)}</div>
        <p class="node-text">${esc(node.text)}</p></div></div>
      <div class="player-nav"><button class="btn btn-primary" data-next="${node.next}">Continue</button>
      <span class="stepper">STEP ${st.steps+1}</span></div></div>`;
  }
  else if(node.type==="decision"){
    inner = `<div class="panel-body">
      <div class="node-title">Decision point</div>
      <p class="node-text" style="font-weight:600">${esc(node.prompt)}</p>
      <div class="options">${node.options.map((o,i)=>
        `<button class="opt" data-opt="${i}"><span class="key">${String.fromCharCode(65+i)}</span><span>${esc(o.label)}</span></button>`).join("")}
      </div></div>`;
  }
  else if(node.type==="info"){
    inner = `<div class="panel-body">
      <div class="node-title">${esc(node.title)}</div>
      <ul class="bullets">${node.bullets.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
      <div class="player-nav"><button class="btn btn-primary" data-next="${node.next}">Continue</button></div></div>`;
  }
  else if(node.type==="summary"){
    inner = `<div class="panel-body">
      <div class="node-title">${esc(node.title)}</div>
      <p class="node-text">${esc(node.text)}</p>
      <div class="player-nav"><button class="btn btn-primary" data-next="quiz">Knowledge Check</button></div></div>`;
  }
  else if(node.type==="quiz"){
    return renderQuiz(mod, st, node);
  }

  $("#app").innerHTML = `
    <div class="player">
      <div class="player-head">
        <button class="btn btn-ghost btn-sm" id="backBtn">← Dashboard</button>
        <div><div class="crumbs">${mod.unit} // ${esc(mod.cat).toUpperCase()}</div><h2>${esc(mod.title)}</h2></div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="led red"></span>SCENARIO ACTIVE · NODE ${Math.min(st.steps+1,totalNodes)}/${totalNodes}</div>
        ${inner}
      </div>
    </div>`;

  $("#backBtn").addEventListener("click",()=>go({name:"dash"}));
  document.querySelectorAll("[data-next]").forEach(b=>b.addEventListener("click",()=>{
    st.node=b.dataset.next; st.steps++; save(); renderModule(id);
  }));
  document.querySelectorAll("[data-opt]").forEach(b=>b.addEventListener("click",()=>{
    const o=node.options[+b.dataset.opt];
    awardXP(o.xp, o.quality==="good"?"strong decision":"lesson learned");
    showFeedback(mod, st, node, o);
  }));
}

function showFeedback(mod, st, node, o){
  const labels={good:"CORRECT DECISION",risky:"PARTIALLY SAFE",bad:"HIGH-RISK DECISION"};
  const panel = $("#app .panel .panel-body");
  panel.innerHTML = `
    <div class="node-title">Consequence</div>
    <p class="node-text dim" style="margin-bottom:12px">You chose: “${esc(o.label)}”</p>
    <div class="feedback ${o.quality}">
      <div class="fb-head"><span class="led ${o.quality==="good"?"":o.quality==="risky"?"amber":"red"}"></span>${labels[o.quality]}<span class="fb-xp">+${o.xp} XP</span></div>
      <p class="node-text">${esc(o.feedback)}</p>
    </div>
    <div class="player-nav"><button class="btn btn-primary" id="fbNext">Continue</button></div>`;
  $("#fbNext").addEventListener("click",()=>{ st.node=o.next; st.steps++; save(); renderModule(mod.id); });
  $("#fbNext").focus();
}

/* ---------- module quiz ---------- */
function renderQuiz(mod, st, node){
  if(st.qIndex===undefined || st.qIndex>=node.questions.length){ st.qIndex=0; st.qScore=0; }
  const qi=st.qIndex, Q=node.questions[qi];

  $("#app").innerHTML = `
    <div class="player">
      <div class="player-head">
        <button class="btn btn-ghost btn-sm" id="backBtn">← Dashboard</button>
        <div><div class="crumbs">${mod.unit} // KNOWLEDGE CHECK</div><h2>${esc(mod.title)}</h2></div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="led amber"></span>QUESTION ${qi+1}/${node.questions.length}</div>
        <div class="panel-body">
          <p class="quiz-q">${esc(Q.q)}</p>
          <div class="options">${Q.options.map((op,i)=>
            `<button class="opt" data-q="${i}"><span class="key">${String.fromCharCode(65+i)}</span><span>${esc(op)}</span></button>`).join("")}
          </div>
          <div id="qResult"></div>
        </div>
      </div>
    </div>`;
  $("#backBtn").addEventListener("click",()=>go({name:"dash"}));

  document.querySelectorAll("[data-q]").forEach(b=>b.addEventListener("click",()=>{
    const pick=+b.dataset.q, correct=pick===Q.answer;
    document.querySelectorAll("[data-q]").forEach((x,i)=>{
      x.disabled=true;
      if(i===Q.answer) x.classList.add("correct");
      else if(i===pick) x.classList.add("wrong");
    });
    if(correct){ st.qScore++; awardXP(25,"correct answer"); }
    $("#qResult").innerHTML = `
      <p class="explain"><b style="color:${correct?"var(--green)":"var(--red)"}">${correct?"Correct.":"Not quite."}</b> ${esc(Q.explain)}</p>
      <div class="player-nav"><button class="btn btn-primary" id="qNext">${qi+1<node.questions.length?"Next Question":"Finish Module"}</button></div>`;
    $("#qNext").addEventListener("click",()=>{
      st.qIndex++;
      if(st.qIndex<node.questions.length){ save(); renderQuiz(mod, st, node); }
      else finishModule(mod, st, node);
    });
    $("#qNext").focus();
  }));
}

function finishModule(mod, st, node){
  const first=!st.done;
  st.done=true; st.score=st.qScore; st.total=node.questions.length;
  st.perfect = st.perfect || st.qScore===node.questions.length;
  st.node="start"; st.steps=0; st.qIndex=undefined; save();
  if(first) awardXP(100,"module complete");
  checkBadges(); save();

  const pct=Math.round(100*st.score/st.total);
  $("#app").innerHTML = `
    <div class="player"><div class="panel">
      <div class="panel-head"><span class="led"></span>MODULE COMPLETE</div>
      <div class="gate">
        ${ART.shield}
        <h2 style="text-transform:uppercase">${esc(mod.title)}</h2>
        <p class="node-text">Knowledge check: <b>${st.score}/${st.total}</b> (${pct}%)${st.perfect?" — perfect score.":""}</p>
        <p class="node-text dim">Personalized guidance: ${
          pct===100 ? "Excellent situational judgment — you applied every control correctly. Consider mentoring colleagues on this topic."
          : pct>=60 ? "Solid grasp of the fundamentals. Revisit the best-practice checklist in this unit to close the remaining gaps."
          : "Re-run this scenario and focus on the consequence explanations — the reasoning matters more than the score."}</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-primary" id="doneBack">Back to Dashboard</button>
          <button class="btn btn-ghost" id="doneRetry">Replay Scenario</button>
        </div>
      </div>
    </div></div>`;
  $("#doneBack").addEventListener("click",()=>go({name:"dash"}));
  $("#doneRetry").addEventListener("click",()=>go({name:"module",id:mod.id}));
}

  if(examRun.i>=EXAM.questions.length){ return finishExam(); }
  const Q=EXAM.questions[examRun.i];
  $("#app").innerHTML = `
    <div class="player">
      <div class="player-head">
        <button class="btn btn-ghost btn-sm" id="backBtn">← Dashboard</button>
        <div><div class="crumbs">CERTIFICATION // FINAL EXAM</div><h2>OT Cybersecurity Awareness</h2></div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="led red"></span>QUESTION ${examRun.i+1}/${EXAM.questions.length} · PASS MARK ${EXAM.pass}/${EXAM.questions.length} · SCORE ${examRun.score}</div>
        <div class="panel-body">
          <p class="quiz-q">${esc(Q.q)}</p>
          <div class="options">${Q.options.map((op,i)=>

  $("#app").innerHTML = `

}

      <div class="player-head no-print">
        <button class="btn btn-ghost btn-sm" id="backBtn">← Dashboard</button>
        <div><div class="crumbs">CERTIFICATION // COMPLETE</div><h2>Certificate of Completion</h2></div>
      </div>
      <div class="panel panel-body no-print" style="margin-bottom:16px">
        <label class="flabel" for="nm">Name on certificate</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <input class="field" id="nm" value="${esc(S.name)}" placeholder="Full name">
          <button class="btn btn-primary btn-sm" id="saveNm">Save Name</button>
          <button class="btn btn-ghost btn-sm" id="printBtn">Print / Save PDF</button>
        </div>
      </div>
      <div class="cert">
        <img class="cert-seal" src="${LOGO}" alt="Xploit Academy logo">
        <div class="mono">OT Cyber Range by Xploit Academy · Industrial Cybersecurity Awareness</div>
        <h2>Certificate of Completion</h2>
        <div class="mono">This certifies that</div>
        <div class="cert-name">${esc(S.name||"—— Enter your name above ——")}</div>
        <p class="node-text" style="max-width:60ch;margin:8px auto">has successfully completed all ten scenario-based training units and passed the final examination in Operational Technology cybersecurity awareness, covering removable media, secure remote access, patch &amp; change management, phishing defense, network segmentation, control logic integrity, access control hardening, physical security, and incident response.</p>
        <p class="mono" style="margin-top:16px">FINAL SCORE ${S.examScore}/${EXAM.questions.length} · ISSUED ${esc(S.examDate)} · XPLOITACADEMY.COM</p>
      </div>
    </div>`;
  $("#backBtn").addEventListener("click",()=>go({name:"dash"}));
  $("#saveNm").addEventListener("click",()=>{ S.name=$("#nm").value.trim(); save(); renderCert(); toast("Name saved","green"); });
  $("#printBtn").addEventListener("click",()=>window.print());
}

/* ---------- boot ---------- */
$("#brandLogo").src = LOGO;
$("#brandBtn").addEventListener("click",()=>go({name:"dash"}));
applyTheme();
render();
checkBadges();
</script>
</body>
</html>
